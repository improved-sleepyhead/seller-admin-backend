services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        NODE_VERSION: ${NODE_VERSION:-22.14.0}
        APP_PORT: ${PORT:-8080}
        APP_HOST: ${HOST:-0.0.0.0}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8080}
      HOST: ${HOST:-0.0.0.0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      AI_ENABLED: ${AI_ENABLED:-true}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-next-80b-a3b-instruct}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-45000}
    expose:
      - "${PORT:-8080}"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port = process.env.PORT || 8080; fetch('http://127.0.0.1:' + port + '/api/ai/status').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      UPSTREAM_HOST: api
      UPSTREAM_PORT: ${PORT:-8080}
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/api/ai/status >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
